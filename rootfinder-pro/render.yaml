services:
  - type: web
    name: rootfinder-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rootfinder-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # User must provide this in Render dashboard

databases:
  - name: rootfinder-db
    plan: free
