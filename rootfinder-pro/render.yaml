services:
  - type: web
    name: rootfinder-backend
    runtime: node
    buildCommand: npm install && npm run build:server
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false